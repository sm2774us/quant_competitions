name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
      - name: Build and Test Python Solutions
        run: |
          # Find all pyproject.toml and run tests
          find . -name "pyproject.toml" -execdir poetry install \;
          find . -name "pyproject.toml" -execdir poetry run pytest \;

  cpp-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Latest GCC/Clang for C++26
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build
      - name: Build and Test C++ Solutions
        run: |
          # Find all CMakeLists.txt and build
          find . -name "CMakeLists.txt" -not -path "*/build/*" | while read -r cmake_file; do
            dir=$(dirname "$cmake_file")
            echo "Building $dir"
            cmake -S "$dir" -B "$dir/build" -G Ninja -DCMAKE_CXX_STANDARD=26
            cmake --build "$dir/build"
            # Run tests if they exist
            if [ -f "$dir/build/run_tests" ]; then "$dir/build/run_tests"; fi
          done

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust 1.93.1
        run: |
          rustup toolchain install 1.93.1
          rustup default 1.93.1
      - name: Build and Test Rust Solutions
        run: |
          find . -name "Cargo.toml" | while read -r cargo_file; do
            dir=$(dirname "$cargo_file")
            echo "Building $dir"
            cargo build --manifest-path "$cargo_file"
            cargo test --manifest-path "$cargo_file"
          done
