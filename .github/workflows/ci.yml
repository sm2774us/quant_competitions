name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bazel-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # --- Toolchain Setup ---
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install C++ Tools (GCC 14, CMake, Ninja)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build libcurl4-openssl-dev

      - name: Set up Rust 1.93.1
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      # --- Bazel Setup & Execution ---
      - name: Install Bazelisk
        run: |
          sudo npm install -g @bazel/bazelisk

      - name: Generate BUILD.bazel dynamically
        run: |
          chmod +x generate_build.py
          python generate_build.py

      - name: Run All Tests via Bazel
        run: |
          chmod +x discover_and_test.sh # Ensure this is executable
          bazel test //... --test_output=errors
